name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npx turbo build

      - name: Run tests
        run: npx turbo test --filter=@cmsmcp/shared --filter=@cmsmcp/wordpress --filter=@cmsmcp/woocommerce --filter=@cmsmcp/framer --filter=@cmsmcp/strapi --filter=@cmsmcp/ghost
